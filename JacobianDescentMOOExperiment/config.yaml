# Configuration for Jacobian Descent CIFAR-10 Reproduction
# Paper: "Jacobian Descent for Multi-Objective Optimization" (arXiv:2406.16232)

experiment:
  name: "JD_CIFAR10_Reproduction"
  seed: 42
  run_seeds: [0, 1, 2, 3, 4, 5, 6, 7]
  device: "cuda"  # or "cpu"
  
dataset:
  name: "CIFAR10"
  num_tasks: 5
  classes_per_task: 2
  train_subset_size: 1024
  data_root: "./data"
  
model:
  architecture: "PaperCNN"  # Paper-style lightweight CNN with ELU
  pretrained: false
  
training:
  num_epochs: 20
  batch_size: 128
  learning_rate: 0.1
  momentum: 0.0
  weight_decay: 0.0
  scheduler: "none"
  num_workers: 2
  evaluate_test: true
  
aggregators:
  - name: "Mean"
    type: "mean"
  - name: "UPGrad"
    type: "upgrad"
    epsilon: 1.0e-8
  - name: "MGDA"
    type: "mgda"
  - name: "CAGrad"
    type: "cagrad"
    c: 0.5
    
evaluation:
  metrics:
    - "training_cross_entropy"
    - "update_similarity_to_sgd"
    - "average_accuracy"      # auxiliary
    - "per_task_accuracy"     # auxiliary
    - "fairness"              # auxiliary
  eval_frequency: 10
  
logging:
  log_dir: "./logs"
  save_checkpoints: true
  checkpoint_frequency: 50
